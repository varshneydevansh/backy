name: SDK Smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  sdk-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run SDK smoke
        run: npm run ci:sdk-smoke
