name: Settings Provider Certification

on:
  workflow_dispatch:
    inputs:
      certify_storage:
        description: Run live storage provisioning diagnostics.
        required: true
        type: boolean
        default: true
      storage_provider:
        description: Expected media storage provider for Settings certification.
        required: true
        type: choice
        default: auto
        options:
          - auto
          - local
          - s3
          - supabase
      certify_rotation:
        description: Run storage credential rotation diagnostics.
        required: true
        type: boolean
        default: false
      certify_vercel_secrets:
        description: Run Vercel env secret-manager dry-run planning.
        required: true
        type: boolean
        default: false
      vercel_project_id:
        description: Optional expected Vercel project id for secret-manager certification.
        required: false
        type: string
      vercel_team_id:
        description: Optional expected Vercel team id for secret-manager certification.
        required: false
        type: string
      certify_notification:
        description: Run live notification webhook delivery diagnostics.
        required: true
        type: boolean
        default: true
      notification_provider:
        description: Expected notification runtime provider in addition to the webhook delivery capture.
        required: true
        type: choice
        default: auto
        options:
          - auto
          - webhook
          - http-endpoint
          - resend
          - smtp
          - local-outbox
      certify_commerce:
        description: Also run the commerce provider certification gate from this Settings provider gate.
        required: true
        type: boolean
        default: true
      payment_provider:
        description: Expected payment/refund provider for nested Commerce certification.
        required: true
        type: choice
        default: auto
        options:
          - auto
          - stripe
          - paypal
          - paddle
          - square
          - adyen
          - mollie
          - razorpay
      tax_provider:
        description: Expected tax quote provider for nested Commerce certification.
        required: true
        type: choice
        default: auto
        options:
          - auto
          - stripe
          - taxjar
          - avalara
          - http
      shipping_provider:
        description: Expected shipping quote or label provider for nested Commerce certification.
        required: true
        type: choice
        default: auto
        options:
          - auto
          - easypost
          - shippo
          - http
      discount_provider:
        description: Expected discount quote provider for nested Commerce certification.
        required: true
        type: choice
        default: auto
        options:
          - auto
          - stripe
          - http
      catalog_provider:
        description: Expected product catalog provider for nested Commerce certification.
        required: true
        type: choice
        default: auto
        options:
          - auto
          - shopify
          - bigcommerce
          - woocommerce
          - etsy
          - magento
          - http
      subscription_provider:
        description: Expected subscription lifecycle provider for nested Commerce certification.
        required: true
        type: choice
        default: auto
        options:
          - auto
          - stripe
          - paypal
          - paddle
          - square
          - adyen
          - mollie
          - razorpay
          - http
      webhook_provider:
        description: Expected provider-managed webhook family for nested Commerce certification.
        required: true
        type: choice
        default: auto
        options:
          - auto
          - stripe
          - paypal
          - paddle
          - square
          - adyen
          - mollie
          - razorpay
          - generic

jobs:
  settings-provider-certification:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      BACKY_SETTINGS_PROVIDER_CERTIFICATION_REQUIRED: '1'
      BACKY_RELEASE_CERTIFICATION_DOCTOR_REQUIRED: '1'
      BACKY_SETTINGS_CERTIFY_STORAGE: ${{ inputs.certify_storage && '1' || '0' }}
      BACKY_SETTINGS_CERTIFY_STORAGE_PROVIDER: ${{ inputs.storage_provider }}
      BACKY_SETTINGS_CERTIFY_ROTATION: ${{ inputs.certify_rotation && '1' || '0' }}
      BACKY_SETTINGS_CERTIFY_VERCEL_SECRETS: ${{ inputs.certify_vercel_secrets && '1' || '0' }}
      BACKY_SETTINGS_CERTIFY_VERCEL_PROJECT_ID: ${{ inputs.vercel_project_id }}
      BACKY_SETTINGS_CERTIFY_VERCEL_TEAM_ID: ${{ inputs.vercel_team_id }}
      BACKY_SETTINGS_CERTIFY_NOTIFICATION: ${{ inputs.certify_notification && '1' || '0' }}
      BACKY_SETTINGS_CERTIFY_NOTIFICATION_PROVIDER: ${{ inputs.notification_provider }}
