      BACKY_COMMERCE_CERTIFY_SUBSCRIPTION_PROVIDER: ${{ inputs.subscription_provider }}
      BACKY_COMMERCE_CERTIFY_WEBHOOKS: ${{ inputs.certify_commerce && '1' || '0' }}
      BACKY_COMMERCE_CERTIFY_WEBHOOK_PROVIDER: ${{ inputs.webhook_provider }}
      BACKY_COMMERCE_CERTIFICATION_BASE_URL: ${{ vars.BACKY_COMMERCE_CERTIFICATION_BASE_URL || vars.BACKY_SETTINGS_CERTIFICATION_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Settings provider certification preflight
        run: npm run test:settings-provider-certification-preflight-contract

      - name: Run non-secret certification doctor
        run: npm run doctor:release-certification

      - name: Write non-secret Settings certification summary
        run: |
          settings_external=false
          commerce_external=false
          settings_admin_key_configured=false
          commerce_admin_key_configured=false
          if [ -n "$BACKY_SETTINGS_CERTIFICATION_BASE_URL" ]; then settings_external=true; fi
          if [ -n "$BACKY_COMMERCE_CERTIFICATION_BASE_URL" ]; then commerce_external=true; fi
          if [ -n "${BACKY_ADMIN_API_KEY:-${BACKY_SETTINGS_CERTIFICATION_ADMIN_KEY:-}}" ]; then settings_admin_key_configured=true; fi
          if [ -n "${BACKY_ADMIN_API_KEY:-${BACKY_COMMERCE_CERTIFICATION_ADMIN_KEY:-}}" ]; then commerce_admin_key_configured=true; fi
          {
            echo "## Backy Settings Provider Certification"
            echo ""
            echo "| Partial row | Gate | Requested | Aggregate preflight | Admin source guard | Non-secret target evidence |"
            echo "| --- | --- | --- | --- | --- | --- |"
            echo "| /settings and Settings admin APIs | npm run ci:settings-provider-certification | true | npm run test:partial-gate-preflights | npm run test:admin-contract-source | external target configured: $settings_external; admin key configured: $settings_admin_key_configured |"
            echo "| /products and /orders | npm run ci:commerce-provider-certification | ${{ inputs.certify_commerce }} | npm run test:partial-gate-preflights | npm run test:admin-contract-source | external target configured: $commerce_external; admin key configured: $commerce_admin_key_configured |"
            echo ""
            echo "| Selector | Value |"
            echo "| --- | --- |"
            echo "| storage_provider | ${{ inputs.storage_provider }} |"
            echo "| notification_provider | ${{ inputs.notification_provider }} |"
            echo "| payment_provider | ${{ inputs.payment_provider }} |"
            echo "| tax_provider | ${{ inputs.tax_provider }} |"
            echo "| shipping_provider | ${{ inputs.shipping_provider }} |"
            echo "| discount_provider | ${{ inputs.discount_provider }} |"
            echo "| catalog_provider | ${{ inputs.catalog_provider }} |"
            echo "| subscription_provider | ${{ inputs.subscription_provider }} |"
            echo "| webhook_provider | ${{ inputs.webhook_provider }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run Settings provider certification
        run: npm run ci:settings-provider-certification

      - name: Run Commerce provider certification from Settings provider gate
        if: ${{ inputs.certify_commerce }}
        run: npm run ci:commerce-provider-certification
