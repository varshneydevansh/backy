name: SDK Postgres Smoke

on:
  workflow_dispatch:
    inputs:
      disposable_database_confirmed:
        description: I confirm BACKY_DATABASE_URL or DATABASE_URL points to a disposable migrated Supabase/Postgres database.
        required: true
        type: boolean
        default: false
      database_expected_host:
        description: Optional expected Postgres/Supabase hostname before the smoke connects.
        required: false
        type: string
      database_expected_name:
        description: Optional expected Postgres database name before the smoke connects.
        required: false
        type: string

jobs:
  sdk-postgres-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      BACKY_DATABASE_URL: ${{ secrets.BACKY_DATABASE_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BACKY_DATABASE_CERTIFICATION_EXPECTED_HOST: ${{ inputs.database_expected_host }}
      BACKY_DATABASE_CERTIFICATION_EXPECTED_DATABASE: ${{ inputs.database_expected_name }}
      BACKY_RELEASE_CERTIFY_DATABASE: '1'
      BACKY_DATA_MODE: database
      BACKY_SDK_REQUIRE_DATABASE: '1'
      BACKY_ADMIN_API_KEY: sdk-postgres-smoke-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run SDK Postgres preflight contract
        run: npm run test:sdk-postgres-preflight-contract

      - name: Run non-secret database certification doctor
        run: npm run doctor:release-certification

      - name: Write non-secret SDK database summary
        run: |
          {
            echo "## Backy SDK Postgres Certification"
            echo ""
            echo "| Partial row | Gate | Requested | Non-secret target evidence |"
            echo "| --- | --- | --- | --- |"
            echo "| Frontend manifest/OpenAPI/SDK APIs | npm run ci:sdk-postgres-smoke | true | disposable confirmed: ${{ inputs.disposable_database_confirmed }}; expected host configured: ${{ inputs.database_expected_host != '' }}; expected database configured: ${{ inputs.database_expected_name != '' }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Require disposable Postgres or Supabase database URL
        run: |
          if [ -z "${BACKY_DATABASE_URL:-${DATABASE_URL:-}}" ]; then
            echo "::error::Set the BACKY_DATABASE_URL or DATABASE_URL repository secret to a disposable migrated Supabase/Postgres database before running this workflow."
            exit 1
          fi
          if [ "${{ inputs.disposable_database_confirmed }}" != "true" ]; then
            echo "::error::Confirm disposable_database_confirmed=true before running this database-mode SDK smoke."
            exit 1
          fi

      - name: Run SDK Postgres/Supabase smoke
        run: npm run ci:sdk-postgres-smoke
